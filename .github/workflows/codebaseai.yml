name: CodebaseAI CI Analysis

on:
  workflow_run:
    workflows: ["PayFlow API — CI"]
    types: [completed]

jobs:
  analyze:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - name: Send to CodebaseAI
        env:
          REPO: ${{ github.repository }}
          REPO_NAME: ${{ github.event.repository.name }}
          OWNER: ${{ github.repository_owner }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          RUN_NAME: ${{ github.event.workflow_run.name }}
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          IS_PRIVATE: ${{ github.event.repository.private }}
          API_KEY: ${{ secrets.CODEBASEAI_KEY }}
        run: |
          curl -X POST https://api.codebaseai.in/api/webhooks/github \
            --max-time 30 \
            -H "Content-Type: application/json" \
            -H "x-github-event: workflow_run" \
            -H "x-codebaseai-key: $API_KEY" \
            -d "{\"action\":\"completed\",\"workflow_run\":{\"id\":\"$RUN_ID\",\"name\":\"$RUN_NAME\",\"conclusion\":\"$CONCLUSION\",\"head_sha\":\"$HEAD_SHA\",\"head_branch\":\"$HEAD_BRANCH\"},\"repository\":{\"full_name\":\"$REPO\",\"name\":\"$REPO_NAME\",\"private\":$IS_PRIVATE,\"default_branch\":\"$DEFAULT_BRANCH\",\"owner\":{\"login\":\"$OWNER\"}}}"
