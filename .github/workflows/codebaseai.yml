name: CodebaseAI CI Analysis

on:
  workflow_run:
    workflows: ["PayFlow API — CI"]
    types: [completed]

jobs:
  analyze:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - name: Send to CodebaseAI
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          API_KEY: ${{ secrets.CODEBASEAI_KEY }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          REPO: ${{ github.repository }}
        run: |
          # Fetch the failed job logs
          JOBS=$(curl -s \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/actions/runs/$RUN_ID/jobs")
          
          FAILED_JOB_ID=$(echo $JOBS | python3 -c "
          import json,sys
          jobs = json.load(sys.stdin)['jobs']
          failed = [j for j in jobs if j['conclusion'] == 'failure']
          print(failed[0]['id'] if failed else '')
          ")
          
          if [ -n "$FAILED_JOB_ID" ]; then
            LOGS=$(curl -s \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$REPO/actions/jobs/$FAILED_JOB_ID/logs")
            
            # Truncate to last 8000 chars
            LOGS=$(echo "$LOGS" | tail -c 8000)
          fi
          
          curl -X POST https://api.codebaseai.in/api/webhooks/github \
            --max-time 30 \
            -H "Content-Type: application/json" \
            -H "x-github-event: workflow_run" \
            -H "x-codebaseai-key: $API_KEY" \
            -d "{
              \"action\": \"completed\",
              \"logs\": $(echo \"$LOGS\" | python3 -c \"import json,sys; print(json.dumps(sys.stdin.read()))\"),
              \"workflow_run\": {
                \"id\": \"${{ github.event.workflow_run.id }}\",
                \"name\": \"${{ github.event.workflow_run.name }}\",
                \"conclusion\": \"${{ github.event.workflow_run.conclusion }}\",
                \"head_sha\": \"${{ github.event.workflow_run.head_sha }}\",
                \"head_branch\": \"${{ github.event.workflow_run.head_branch }}\"
              },
              \"repository\": {
                \"full_name\": \"${{ github.repository }}\",
                \"name\": \"${{ github.event.repository.name }}\",
                \"private\": ${{ github.event.repository.private }},
                \"default_branch\": \"${{ github.event.repository.default_branch }}\",
                \"owner\": {\"login\": \"${{ github.repository_owner }}\"}
              }
            }"
